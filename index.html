<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RouteTracker | Auto‑Schedule GPS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginContainer">
  <div class="login-card">
    <i class="fas fa-route" style="font-size: 3rem; color: #27ae60;"></i>
    <h2>RouteTracker</h2>
    <div class="subtitle">Your journey, recorded.</div>
    <div class="input-group">
      <label><i class="fas fa-user"></i> Username</label>
      <input type="text" id="loginUsername" placeholder="alice" autocomplete="off">
    </div>
    <div class="input-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="loginPassword" placeholder="••••••">
    </div>
    <div class="btn-group-login">
      <button class="btn-login" id="loginBtn">Login</button>
      <button class="btn-register" id="registerBtn">Register</button>
    </div>
    <div id="loginError" class="error-msg"></div>
    <div class="demo-credentials">Register a new account to get started.</div>
  </div>
</div>
<div id="app">
  <div class="app-header">
    <div><i class="fas fa-route"></i> <strong>RouteTracker</strong></div>
    <div class="timer-panel" id="timerDisplay">00:00:00</div>
    <div class="distance-panel" id="distanceDisplay">0.00 km</div>
    <div class="schedule-group">
      <label><i class="fas fa-play-circle"></i> Start:</label>
      <input type="datetime-local" id="scheduledStart" step="1">
      <label><i class="fas fa-stop-circle"></i> Stop:</label>
      <input type="datetime-local" id="scheduledStop" step="1">
      <button id="scheduleBtn" class="schedule-toggle">Set Schedule</button>
    </div>
    <div class="btn-group">
      <button id="refreshHistoryBtn" class="history-toggle">Refresh</button>
    </div>
  </div>
  <div class="main-container">
    <div id="map"></div>
    <div class="history-sidebar">
      <div class="history-header">
        <span><i class="fas fa-database"></i> Past Routes</span>
        <span class="info-status" id="routeCountBadge">0 routes</span>
      </div>
      <ul id="historyList" class="history-list"><li>No routes yet.</li></ul>
      <div class="footer-note">
        <i class="fas fa-map-marker-alt"></i> Stops (orange) after 60 sec stationary (within 12m).<br>
        Real‑time distance & timer. Auto‑start/stop at scheduled times.
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
